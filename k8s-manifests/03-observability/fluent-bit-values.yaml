# Fluent Bit — ships container logs to CloudWatch.
# CloudWatch is your NIST AU-9 / AU-11 compliant log store.
# 365-day retention is set on the log group in 04-kubernetes Terraform.
#
# Deploy with:
#   helm repo add fluent https://fluent.github.io/helm-charts
#   helm upgrade --install fluent-bit fluent/fluent-bit \
#     --namespace observability \
#     --values k8s-manifests/03-observability/fluent-bit-values.yaml

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: ""   # <---- change me — run the IRSA command in this README first, then paste the ARN here

config:
  service: |
    [SERVICE]
        Daemon       Off
        Log_Level    info
        HTTP_Server  On
        HTTP_Listen  0.0.0.0
        HTTP_Port    2020
        Health_Check On

  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        multiline.parser  docker, cri
        Tag               kube.*
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        Annotations         Off
        Labels              On

  outputs: |
    [OUTPUT]
        Name                cloudwatch_logs
        Match               kube.*
        region              us-gov-west-1                    # <---- change me if you're in us-gov-east-1
        log_group_name      /eks/${CLUSTER_NAME}/containers
        log_stream_prefix   ${HOST_NAME}-
        auto_create_group   false
        retry_limit         2

env:
  - name: CLUSTER_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.annotations['cluster-name']
  - name: HOST_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

tolerations:
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule

daemonSetVolumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers

daemonSetVolumeMounts:
  - name: varlog
    mountPath: /var/log
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true
