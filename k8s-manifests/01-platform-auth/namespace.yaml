apiVersion: v1
kind: Namespace
metadata:
  name: platform-auth
  labels:
    app.kubernetes.io/managed-by: kubectl
    # Pod Security Standards — restricted profile enforced on this namespace.
    # No privileged containers. No host networking. No root.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
